<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scoopers Reviews Widget – Local Test</title>
  <style>
    body {
      font-family: sans-serif;
      background: #f4f4f4;
      padding: 30px;
    }
    h1 { font-size: 18px; color: #333; margin-bottom: 20px; }
    #debug-panel {
      background: #111;
      color: #ccc;
      font-family: monospace;
      font-size: 12px;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 24px;
      min-height: 60px;
      max-height: 200px;
      overflow-y: auto;
    }
    #debug-panel h2 { color: #aaa; font-size: 13px; margin: 0 0 8px; }
    #scoopers-reviews-ui {
      min-height: 100px;
    }
  </style>
</head>
<body>

  <h1>Scoopers Reviews Widget – Local Test Page</h1>

  <!-- Debug console output -->
  <div id="debug-panel">
    <h2>Debug Log</h2>
    <div id="debug-output"></div>
  </div>

  <!-- Widget mounts here -->
  <div id="scoopers-reviews-ui">
    <p style="color:#aaa; font-style:italic;">Loading reviews…</p>
  </div>

  <!-- Load the widget script -->
  <script src="scoopers-reviews.js"></script>

</body>
</html>
